name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 0/1 * * *' 
  workflow_dispatch:      # 允许手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取所有工作流运行记录（包括分页）
          page=1
          all_run_ids=()
          while :; do
            response=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100&page=$page")

            # 提取所有运行记录的 ID
            run_ids=$(echo "$response" | jq -r '.workflow_runs[] | .id')
            if [ -z "$run_ids" ]; then
              break
            fi

            # 将当前页的运行 ID 添加到总列表
            all_run_ids+=($run_ids)
            ((page++))
          done

          # 只保留最近的 6 条记录
          if [ ${#all_run_ids[@]} -gt 6 ]; then
            delete_ids=("${all_run_ids[@]:6}")  # 从第 7 条开始删除
            for run_id in "${delete_ids[@]}"; do
              echo "Deleting run $run_id"
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
            done
          else
            echo "No old runs to delete (total runs: ${#all_run_ids[@]})"
          fi

          echo "Cleanup completed!"
