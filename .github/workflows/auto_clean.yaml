name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 0/1 * * *' 
  workflow_dispatch:      # 允许手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取所有工作流运行记录（包括分页）
          page=1
          all_runs=()
          while :; do
            response=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100&page=$page")

            # 提取所有运行记录
            runs=$(echo "$response" | jq -c '.workflow_runs[]')
            if [ -z "$runs" ]; then
              break
            fi

            # 将当前页的运行记录添加到总列表
            all_runs+=($runs)
            ((page++))
          done

          # 处理 auto_clean.yaml 工作流
          for run in "${all_runs[@]}"; do
            workflow_name=$(echo "$run" | jq -r '.path')
            status=$(echo "$run" | jq -r '.status')
            run_id=$(echo "$run" | jq -r '.id')

            if [ "$workflow_name" == ".github/workflows/auto_clean.yaml" ] && [ "$status" == "completed" ]; then
              echo "Deleting completed run $run_id from auto_clean.yaml"
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
            fi
          done

          # 处理其他工作流
          for run in "${all_runs[@]}"; do
            workflow_name=$(echo "$run" | jq -r '.path')
            status=$(echo "$run" | jq -r '.status')
            conclusion=$(echo "$run" | jq -r '.conclusion')
            run_id=$(echo "$run" | jq -r '.id')

            if [ "$workflow_name" != ".github/workflows/auto_clean.yaml" ]; then
              # 删除手动取消的记录
              if [ "$status" == "completed" ] && [ "$conclusion" == "cancelled" ]; then
                echo "Deleting manually cancelled run $run_id from $workflow_name"
                curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                  "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
              fi

              # 保留最多 6 条成功的记录
              if [ "$status" == "completed" ] && [ "$conclusion" == "success" ]; then
                successful_runs+=("$run_id")
              fi
            fi
          done

          # 保留最多 6 条成功的记录
          if [ ${#successful_runs[@]} -gt 6 ]; then
            delete_ids=("${successful_runs[@]:6}")  # 从第 7 条开始删除
            for run_id in "${delete_ids[@]}"; do
              echo "Deleting successful run $run_id"
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
            done
          else
            echo "No old successful runs to delete (total successful runs: ${#successful_runs[@]})"
          fi

          echo "Cleanup completed!"
