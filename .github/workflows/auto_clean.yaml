name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 0/1 * * *'  # 每天 UTC 时间午夜运行（北京时间早8点）
  workflow_dispatch:      # 允许手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 计算时间阈值（6小时前）
          cutoff_time=$(date -u -d "6 hours ago" +%s)

          # 获取所有工作流运行记录（包括分页）
          page=1
          while :; do
            response=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100&page=$page")

            # 提取符合条件的运行 ID
            run_ids=$(echo "$response" | jq -r --arg ct "$cutoff_time" '
              .workflow_runs[] | 
              select(
                .status == "completed" and 
                (.updated_at | fromdateiso8601) < ($ct | tonumber)
              ) | .id
            ')

            # 没有更多数据时退出循环
            if [ -z "$run_ids" ]; then
              break
            fi

            # 批量删除旧记录
            for run_id in $run_ids; do
              echo "Deleting run $run_id"
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
            done

            ((page++))
          done

          echo "Cleanup completed!"
